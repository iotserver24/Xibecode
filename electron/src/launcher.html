<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XibeCode Quick Launcher</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: rgba(20, 20, 30, 0.95);
      backdrop-filter: blur(20px);
      height: 100vh;
      overflow: hidden;
      border-radius: 12px;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .search-box {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 18px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(102, 126, 234, 0.8);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .results {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .section-title {
      padding: 10px 20px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
    }

    .result-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }

    .result-item:hover,
    .result-item.selected {
      background: rgba(102, 126, 234, 0.2);
      border-left-color: #667eea;
    }

    .result-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 12px;
      background: rgba(255, 255, 255, 0.1);
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-path {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .result-meta {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-left: 8px;
    }

    .pin-indicator {
      color: #ffd700;
      margin-left: 8px;
    }

    .shortcut {
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      font-family: monospace;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: rgba(255, 255, 255, 0.4);
    }

    .actions {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      background: rgba(102, 126, 234, 0.2);
      border: 1px solid rgba(102, 126, 234, 0.4);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .action-btn:hover {
      background: rgba(102, 126, 234, 0.3);
    }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="search-box">
      <input type="text" class="search-input" id="search-input" placeholder="Search projects, workspaces, or actions..." autofocus>
    </div>

    <div class="results" id="results">
      <!-- Results populated by JS -->
    </div>

    <div class="actions" id="actions" style="display: none;">
      <button class="action-btn" id="btn-new-project">
        <span>✨</span> New Project
      </button>
      <button class="action-btn" id="btn-open-folder">
        <span>📂</span> Open Folder
      </button>
      <button class="action-btn" id="btn-clone-repo">
        <span>📦</span> Clone Repo
      </button>
    </div>

    <div class="footer">
      <span>XibeCode Quick Launcher</span>
      <span class="shortcut">↑↓ Navigate</span>
      <span class="shortcut">↵ Open</span>
      <span class="shortcut">Esc Close</span>
    </div>
  </div>

  <script>
    const api = window.xibecode;
    let allProjects = [];
    let allWorkspaces = [];
    let selectedIndex = 0;
    let filteredResults = [];

    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('results');
    const actionsContainer = document.getElementById('actions');

    // Load data
    async function loadData() {
      allProjects = await api.getRecentProjects();
      allWorkspaces = await api.getWorkspaces();
      updateResults();
    }

    // Format relative time
    function relativeTime(isoDate) {
      const diff = Date.now() - new Date(isoDate).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      if (days < 30) return days + 'd ago';
      return Math.floor(days / 30) + 'mo ago';
    }

    // Update results
    function updateResults() {
      const query = searchInput.value.toLowerCase().trim();
      
      if (!query) {
        // Show recent projects and workspaces
        filteredResults = [
          ...allProjects.slice(0, 5).map(p => ({ type: 'project', data: p })),
          ...allWorkspaces.slice(0, 3).map(w => ({ type: 'workspace', data: w }))
        ];
      } else {
        // Search
        filteredResults = [
          ...allProjects
            .filter(p => p.name.toLowerCase().includes(query) || p.path.toLowerCase().includes(query))
            .map(p => ({ type: 'project', data: p })),
          ...allWorkspaces
            .filter(w => w.name.toLowerCase().includes(query))
            .map(w => ({ type: 'workspace', data: w }))
        ];
      }

      // Add actions if query matches
      if (!query || 'new project'.includes(query)) {
        filteredResults.push({ type: 'action', data: { id: 'new-project', name: 'New Project', icon: '✨' } });
      }
      if (!query || 'open folder'.includes(query)) {
        filteredResults.push({ type: 'action', data: { id: 'open-folder', name: 'Open Folder', icon: '📂' } });
      }
      if (!query || 'clone'.includes(query)) {
        filteredResults.push({ type: 'action', data: { id: 'clone-repo', name: 'Clone Repository', icon: '📦' } });
      }

      selectedIndex = 0;
      renderResults();
    }

    // Render results
    function renderResults() {
      if (filteredResults.length === 0) {
        resultsContainer.innerHTML = '<div class="empty-state">No results found</div>';
        return;
      }

      let currentSection = null;
      let html = '';

      filteredResults.forEach((item, index) => {
        // Add section header
        if (item.type !== currentSection) {
          currentSection = item.type;
          const sectionTitles = { project: 'Projects', workspace: 'Workspaces', action: 'Actions' };
          html += `<div class="section-title">${sectionTitles[item.type]}</div>`;
        }

        const isSelected = index === selectedIndex;
        
        if (item.type === 'project') {
          const p = item.data;
          html += `
            <div class="result-item ${isSelected ? 'selected' : ''}" data-index="${index}" data-type="project" data-path="${p.path}">
              <div class="result-icon">📁</div>
              <div class="result-info">
                <div class="result-name">
                  ${p.name}
                  ${p.pinned ? '<span class="pin-indicator">★</span>' : ''}
                </div>
                <div class="result-path">${p.path}</div>
              </div>
              <div class="result-meta">${relativeTime(p.lastOpened)}</div>
            </div>
          `;
        } else if (item.type === 'workspace') {
          const w = item.data;
          html += `
            <div class="result-item ${isSelected ? 'selected' : ''}" data-index="${index}" data-type="workspace" data-id="${w.id}">
              <div class="result-icon">🗂️</div>
              <div class="result-info">
                <div class="result-name">${w.name}</div>
                <div class="result-path">${w.projects.length} projects</div>
              </div>
            </div>
          `;
        } else if (item.type === 'action') {
          const a = item.data;
          html += `
            <div class="result-item ${isSelected ? 'selected' : ''}" data-index="${index}" data-type="action" data-action="${a.id}">
              <div class="result-icon">${a.icon}</div>
              <div class="result-info">
                <div class="result-name">${a.name}</div>
              </div>
              <span class="shortcut">Action</span>
            </div>
          `;
        }
      });

      resultsContainer.innerHTML = html;

      // Add click handlers
      document.querySelectorAll('.result-item').forEach(el => {
        el.addEventListener('click', () => selectItem(parseInt(el.dataset.index)));
        el.addEventListener('dblclick', () => {
          selectItem(parseInt(el.dataset.index));
          activateItem();
        });
      });

      // Scroll selected into view
      const selectedEl = document.querySelector('.result-item.selected');
      if (selectedEl) {
        selectedEl.scrollIntoView({ block: 'nearest' });
      }
    }

    // Select item
    function selectItem(index) {
      selectedIndex = index;
      document.querySelectorAll('.result-item').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
      });
    }

    // Activate selected item
    async function activateItem() {
      const item = filteredResults[selectedIndex];
      if (!item) return;

      if (item.type === 'project') {
        await api.openRecent(item.data.path);
        window.close();
      } else if (item.type === 'workspace') {
        // Open all projects in workspace
        for (const projectPath of item.data.projects) {
          await api.openRecent(projectPath);
        }
        window.close();
      } else if (item.type === 'action') {
        if (item.data.id === 'new-project') {
          window.close();
          // Send message to welcome window
        } else if (item.data.id === 'open-folder') {
          await api.openFolder();
          window.close();
        } else if (item.data.id === 'clone-repo') {
          window.close();
        }
      }
    }

    // Event listeners
    searchInput.addEventListener('input', updateResults);

    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault();
          selectedIndex = (selectedIndex + 1) % filteredResults.length;
          renderResults();
          break;
        case 'ArrowUp':
          e.preventDefault();
          selectedIndex = (selectedIndex - 1 + filteredResults.length) % filteredResults.length;
          renderResults();
          break;
        case 'Enter':
          e.preventDefault();
          activateItem();
          break;
        case 'Escape':
          window.close();
          break;
      }
    });

    // Initialize
    loadData();
    searchInput.focus();
  </script>
</body>
</html>
