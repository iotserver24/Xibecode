appId: com.xibecode.desktop
productName: XibeCode
copyright: Copyright 2025 Anish Kumar

directories:
  output: release
  buildResources: resources

files:
  - from: dist
    to: dist
  - package.json

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: resources/icon.icns

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico

linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
